<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record-page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/record-page.css')}}">
</head>
<body>
    {% include 'header.html' %}

    <main class="main">
        <div class="form-container">
            <div class="page-header">
                <h1>Memory log</h1>
                <a href="{{ url_for('show_list') }}" class="back-link">一覧に戻る</a>
            </div>

            <div class="form-card">
                <form action="{{ url_for('save_log') }}" method="POST" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="category">カテゴリー</label>
                        <select name="category" id="category">
                            <option value="place">場所</option>
                            <option value="food">食べ物</option>
                            <option value="book">本</option>
                            <option value="movie">映画</option>
                            <option value="other">その他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">ステータス</label>
                        <select name="status" id="status">
                            <option value="wish">⭐Wish</option>
                            <option value="done">✅Done</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="title">タイトル</label>
                        <input type="text" name="title" id="title" placeholder="本の名前、場所の名称など" required>
                    </div>

                    <div class="form-group">
                        <label for="date">日付</label>
                        <input type="date" name="date" id="date">
                    </div>

                    <div class="form-group">
                        <label for="content">内容・メモ</label>
                        <textarea name="content" id="content" rows="4" placeholder="感想等を自由に書いて"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="image">写真</label>
                        <input type="file" name="blog_image" id="image" accept="image/*">
                    </div>

                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" name="is_public">
                            この記録をみんなに公開する
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="submit-btn">この記録を保存する</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
