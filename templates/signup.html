<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録</title>
    <link rel="stylesheet" href="../static/css/signup_style.css">
</head>

<body>
    <div class="signup-container">
        <div class="signup-box">
            <h2>新規登録</h2>
            <form action="" method="post"> <!-- ここにサーバーのリンク先を代入してほしい -->
                <div class="input-box">
                    <input type="text" name="student_id" placeholder="学籍番号">
                </div>
                <form onsubmit="return checkPassword();">
                    <div class="input-box">
                        <input type="password" id="pass1" placeholder="パスワード">
                    </div>
                    <div class="input-box">
                        <input type="password" id="pass2" placeholder="パスワード再入力">
                    </div>
                    <button type="submit">登録</button>
                </form>
                <br>
                <a href="login.html">ログインはこちら</a>
            </form>
        </div>
    </div>
</body>

</html>
