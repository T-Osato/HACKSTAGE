<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードの変更</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/change-password_style.css') }}">
</head>

<body>
    {% include 'header.html' %}
    <main class="main-content">
        <div class="setting-container">
            <h1>パスワードの変更</h1>
            <div class="form-content">
                <form action="/change-password" method="post">
                    <ul class="form-list">
                        <li>
                            <label for="current-pw">現在のパスワード</label>
                            <input type="password" id="current-pw" name="current_password" required>
                        </li>
                        <li>
                            <label for="new-pw">新しいパスワード</label>
                            <input type="password" id="new-pw" name="new_password" required>
                        </li>
                        <li>
                            <label for="confirm-pw">パスワードの確認</label>
                            <input type="password" id="confirm-pw" name="confirm_password" required>
                        </li>
                        <li>
                            <button type="submit" class="submit-btn">パスワードを変更する</button>
                        </li>
                    </ul>
                </form>
            </div>
            <a href="/setting" class="back-link">← 設定に戻る</a>
        </div>
    </main>
</body>

</html>
