<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/setting_style.css') }}" />
</head>

<body>
    {% include 'header.html' %}
    <main class="main-content">
        <div class="setting-container">
            <h1>個人設定</h1>

            <section class="link-menu">
                <h2>メニュー・関連リンク</h2>
                <ul class="link-list">
                    <li>
                        <a href="/change-password" class="link-item">
                            <span>パスワードの変更</span>
                            <i class="arrow"></i>
                        </a>
                    </li>
                    <li>
                        <a href="/change-name" class="link-item">
                            <span>名前の変更</span>
                            <i class="arrow"></i>
                        </a>
                    </li>
                    <li>
                        <a href="{{url_for('course_settings')}}" class="link-item">
                            <span>授業予定の入力</span>
                            <i class="arrow"></i>
                        </a>
                    </li>
                    <li>
                        <a href="https://moodle5.osaka-kyoiku.ac.jp/2026/" class="link-item">
                            <span>moodle</span>
                            <i class="icon-external"></i>
                        </a>
                    </li>
                    <li>
                        <a href="https://shrike.bur.osaka-kyoiku.ac.jp/lcu-web/" target="_blank"
                            class="link-item external">
                            <span>LiveCampas</span>
                            <i class="icon-external"></i>
                        </a>
                    </li>
                    {% if user.role == 'admin' %}
                    <li>
                        <a href="{{ url_for('admin_users') }}" class="link-item admin-btn">
                            <span>管理者権限ページ</span>
                        </a>
                    </li>
                    {% endif %}
                    <li style="margin-top: 20px;">
                        <form action="{{ url_for('delete_account') }}" method="POST" onsubmit="return confirm('本当にアカウントを削除しますか？\nこの操作は取り消せません。投稿した掲示板の内容なども全て削除されます。');">
                            <button type="submit" class="link-item danger-btn">
                                <span>アカウントを削除する</span>
                            </button>
                        </form>
                    </li>
                </ul>
            </section>
        </div>
    </main>
</body>

</html>
